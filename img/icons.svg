<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Table icon -->
  <symbol id="icon-table" viewBox="0 0 16 16">
    <rect x="1" y="2" width="14" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1"/>
    <line x1="6" y1="6" x2="6" y2="14" stroke="currentColor" stroke-width="1"/>
  </symbol>
  <!-- View icon -->
  <symbol id="icon-view" viewBox="0 0 16 16">
    <ellipse cx="8" cy="8" rx="6" ry="4" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <circle cx="8" cy="8" r="2" fill="currentColor"/>
  </symbol>
  <!-- Function icon -->
  <symbol id="icon-function" viewBox="0 0 16 16">
    <text x="2" y="13" font-size="12" font-family="serif" font-style="italic" fill="currentColor">ƒ</text>
    <text x="8" y="10" font-size="8" font-family="sans-serif" fill="currentColor">(x)</text>
  </symbol>
  <!-- Column icon -->
  <symbol id="icon-column" viewBox="0 0 16 16">
    <rect x="3" y="2" width="10" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="3" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="0.8"/>
    <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="0.8"/>
    <line x1="3" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="0.8"/>
  </symbol>
  <!-- Key icon -->
  <symbol id="icon-key" viewBox="0 0 16 16">
    <circle cx="5" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <line x1="8" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1.2"/>
    <line x1="12" y1="6" x2="12" y2="9" stroke="currentColor" stroke-width="1.2"/>
  </symbol>
</svg>
